// Tachiyomi Backup Protocol Buffer Definition
// Based on: https://github.com/tachiyomiorg/tachiyomi/blob/master/app/src/main/proto/backup.proto

syntax = "proto3";

message BrokenBackupHistory {
    string url = 0;
    int64 last_read = 1;
}

message BackupHistory {
    string url = 1;
    int64 last_read = 2;
}

message BrokenBackupSource {
    string name = 0;
    int64 source_id = 1;
}

message BackupSource {
    string name = 1;
    int64 source_id = 2;
}

message BackupCategory {
    string name = 1;
    int64 order = 2;
    int64 flags = 100;
}

message BackupChapter {
    string url = 1;
    string name = 2;
    optional string scanlator = 3;
    bool read = 4;
    bool bookmark = 5;
    int32 last_page_read = 6;
    int64 date_fetch = 7;
    int64 date_upload = 8;
    float chapter_number = 9;
    int32 source_order = 10;
}

message BackupTracking {
    int32 sync_id = 1;
    int64 library_id = 2;
    int32 media_id_int = 3;
    string tracking_url = 4;
    string title = 5;
    float last_chapter_read = 6;
    int32 total_chapters = 7;
    float score = 8;
    int32 status = 9;
    int64 started_reading_date = 10;
    int64 finished_reading_date = 11;
    int64 media_id = 100;
}

message BackupManga {
    int64 source = 1;
    string url = 2;
    string title = 3;
    optional string artist = 4;
    optional string author = 5;
    optional string description = 6;
    repeated string genre = 7;
    int32 status = 8;
    optional string thumbnail_url = 9;
    int64 date_added = 13;
    int32 viewer = 14;
    repeated BackupChapter chapters = 16;
    repeated int64 categories = 17;
    repeated BackupTracking tracking = 18;
    bool favorite = 100;
    int32 chapter_flags = 101;
    repeated BrokenBackupHistory broken_history = 102;
    optional int32 viewer_flags = 103;
    repeated BackupHistory history = 104;
}

message Backup {
    repeated BackupManga backup_manga = 1;
    repeated BackupCategory backup_categories = 2;
    repeated BrokenBackupSource backup_broken_sources = 100;
    repeated BackupSource backup_sources = 101;
}
